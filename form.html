<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Package Order Form</title>

    <style>
        * 
        {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Navigation */

nav{
    background:#FFD700;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 8%;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:black;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:black;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:white;
}

        header {
            background:black
            color: white;
            text-align: center;
            padding: 25px;
        }

        header h1 {
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: black;
            margin-bottom: 25px;
        }

        label {
           display: block;
            margin-top: 20px;
            font-weight: 500;
            color: black;
            text-align: left;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .food-options {
            margin-top: 10px;
        }

        .food-options label {
            font-weight: normal;
            margin-top: 8px;
        }

        .food-options input {
            width: auto;
            margin-right: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            border: none;
            border-radius: 6px;
            background: #d62828;
            color: white;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            background: #a4161a;
        }

        .reset-button {
            background: #555;
        }

        .reset-button:hover {
            background: #333;
        }
    </style>
</head>

<body>
   

<nav>
    <div class="logo">Rosyam Mart</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="food packet.html">Campaigns</a></li>
        <li><a href="form.html">Forms</a></li>
        <li><a href="contact.html">Contact</a></li>
        
    </ul>
</nav>

    <header>
        <h1>Food Packet Order Form</h1>
        <p>Choose your favourite food packet and place your order</p>
    </header>

    <div class="container">

        <h2>Customer Information</h2>

        <form>

            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

            <label for="packet">Select Food Packet:</label>
            <select id="packet" name="packet" required>
                <option value="">-- Choose a Packet --</option>
                <option value="packet-a">Basic Food Packet</option>
                <option value="packet-b">Family Food Packet</option>
                <option value="packet-c">Premium Food Packet</option>
                <option value="packet-d">Charity Food Packet</option>
            </select>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required>

            <label for="delivery">Delivery Method:</label>
            <select id="delivery" name="delivery" required>
                <option value="">-- Select Delivery Method --</option>
                <option value="pickup">Self Pickup</option>
                <option value="delivery">Home Delivery</option>
            </select>

            <label for="address">Delivery Address:</label>
            <textarea id="address" name="address" placeholder="Enter your delivery address"></textarea>

            <button type="submit">Submit Order</button>
            <button type="reset" class="reset-button">Reset Form</button>
            <button type="button" class="reset-button" onclick="window.history.back()">Go Back</button>

        </form>

    </div>

</body>
</html>
